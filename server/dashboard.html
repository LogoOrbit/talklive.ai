<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0b0f1a">
<title>TalkLive — Owner Dashboard</title>
<style>
:root{
  --bg-1:#0b0f1a;--bg-2:#111729;--bg-glow:#1c2240;
  --accent:#6c5ce7;--accent-2:#00d4ff;--danger:#ff5470;
  --text:#f2f4ff;--muted:#8a90a8;--ink2:#b9bed4;
  --surface:rgba(255,255,255,.045);--surface-2:rgba(255,255,255,.08);
  --ring:rgba(255,255,255,.09);--grid:rgba(255,255,255,.07);
  --good:#2ee6a8;--warn:#ffc555;--serious:#ff9e6d;--crit:#ff5470;
  --s1:#00d4ff;--s2:#2ee6a8;--s3:#ffc555;--s5:#a29bfe;
  --grad:linear-gradient(135deg,var(--accent),var(--accent-2));
}
@media (prefers-color-scheme: light){:root{
  --bg-1:#eef1f9;--bg-2:#ffffff;--bg-glow:#dde4f5;
  --text:#1a2033;--muted:#5a617a;--ink2:#3c4360;
  --surface:rgba(255,255,255,.72);--surface-2:rgba(26,32,51,.05);
  --ring:rgba(26,32,51,.10);--grid:rgba(26,32,51,.09);
  --accent-2:#0086b3;--s1:#0086b3;--s2:#0e9e6e;--s3:#b57f00;--good:#0e9e6e;--warn:#b57f00;
}}
*{box-sizing:border-box;margin:0}
html{scroll-behavior:smooth}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);min-height:100vh;min-height:100dvh;
  background:radial-gradient(circle at 50% -10%,var(--bg-glow) 0%,var(--bg-1) 55%);background-attachment:fixed}
button{font:inherit;cursor:pointer}
input,textarea,select{font:inherit;background:var(--surface);color:var(--text);border:1px solid var(--ring);border-radius:10px;padding:10px 12px;width:100%;outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
.hidden{display:none!important}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:4px}

/* entrance animations */
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
@keyframes pulse{50%{opacity:.4}}
@keyframes glowmove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.anim{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
.anim:nth-child(2){animation-delay:.04s}.anim:nth-child(3){animation-delay:.08s}.anim:nth-child(4){animation-delay:.12s}
.anim:nth-child(5){animation-delay:.16s}.anim:nth-child(6){animation-delay:.2s}.anim:nth-child(7){animation-delay:.24s}.anim:nth-child(8){animation-delay:.28s}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* auth */
.auth{max-width:400px;margin:8vh auto;padding:30px 28px;background:var(--surface);backdrop-filter:blur(18px);border:1px solid var(--ring);border-radius:22px;animation:pop .4s ease both}
.auth .logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.auth h1{font-size:1.25rem}
.auth p{color:var(--ink2);font-size:.9rem;margin-bottom:14px;line-height:1.5}
.auth label{display:block;font-size:.78rem;color:var(--muted);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.05em}
.auth .err{color:var(--crit);font-size:.85rem;margin-top:10px;min-height:1.2em}
.mark{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:1.05rem;flex:none;box-shadow:0 4px 18px rgba(108,92,231,.45)}
.stbox{font-size:.82rem;border-radius:12px;padding:11px 13px;margin:12px 0;line-height:1.5}
.stbox.bad{background:color-mix(in srgb,var(--crit) 14%,transparent);border:1px solid var(--crit)}
.stbox b{display:block;margin-bottom:4px}
.stbox code{font-family:ui-monospace,monospace;font-size:.76rem;background:var(--surface-2);padding:1px 5px;border-radius:4px;overflow-wrap:anywhere}
.btn{background:var(--grad);color:#fff;border:0;border-radius:12px;padding:12px 16px;width:100%;font-weight:700;margin-top:16px;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(108,92,231,.35)}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(108,92,231,.5)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:transparent;color:var(--ink2);border:1px solid var(--ring);width:auto;padding:7px 14px;margin:0;box-shadow:none}
.qrbox{text-align:center;margin:14px 0}.qrbox img{border-radius:10px;background:#fff;padding:6px}
.secret{font-family:ui-monospace,monospace;font-size:.75rem;word-break:break-all;color:var(--ink2);background:var(--surface-2);padding:8px;border-radius:8px;margin-top:6px}

/* shell */
header{display:flex;align-items:center;gap:12px;padding:12px 18px;padding-top:calc(12px + env(safe-area-inset-top));border-bottom:1px solid var(--grid);position:sticky;top:0;z-index:10;
  background:color-mix(in srgb,var(--bg-1) 78%,transparent);backdrop-filter:blur(16px)}
header h1{font-size:1rem;display:flex;align-items:center;gap:9px;white-space:nowrap}
header h1 .grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:800}
.dot{width:9px;height:9px;border-radius:50%;background:var(--good);display:inline-block;animation:pulse 2s infinite;box-shadow:0 0 10px var(--good)}
nav.top{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;flex:1}
nav.top::-webkit-scrollbar{display:none}
nav.top button{background:transparent;border:0;color:var(--muted);padding:8px 13px;border-radius:10px;font-size:.87rem;white-space:nowrap;transition:color .15s,background .15s}
nav.top button:hover{color:var(--text)}
nav.top button.on{background:var(--surface-2);color:var(--text);font-weight:700}
.badge{background:var(--crit);color:#fff;border-radius:9px;font-size:.66rem;padding:1px 6px;margin-left:5px;font-weight:700;vertical-align:1px}
main{padding:18px;max-width:1200px;margin:0 auto;padding-bottom:calc(84px + env(safe-area-inset-bottom))}
@media(min-width:761px){main{padding-bottom:32px}}

/* mobile bottom nav */
.tabbar{display:none}
@media(max-width:760px){
  header nav.top{display:none}
  .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:10;justify-content:space-around;
    background:color-mix(in srgb,var(--bg-1) 82%,transparent);backdrop-filter:blur(18px);border-top:1px solid var(--grid);
    padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .tabbar button{background:transparent;border:0;color:var(--muted);font-size:.62rem;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;border-radius:12px;min-width:52px;position:relative}
  .tabbar button .ic{font-size:1.25rem;line-height:1;transition:transform .18s}
  .tabbar button.on{color:var(--text);font-weight:700}
  .tabbar button.on .ic{transform:translateY(-2px) scale(1.12)}
  .tabbar .badge{position:absolute;top:0;right:4px;margin:0}
}

/* cards & tiles */
.grid{display:grid;gap:12px}
.tiles{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
.tile{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--ring);border-radius:18px;padding:14px 16px;transition:transform .18s,border-color .18s;position:relative;overflow:hidden}
.tile:hover{transform:translateY(-2px);border-color:var(--accent)}
.tile::before{content:"";position:absolute;inset:0 0 auto;height:2px;background:var(--grad);opacity:0;transition:opacity .18s}
.tile:hover::before{opacity:1}
.tile .k{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.tile .v{font-size:1.75rem;font-weight:800;margin-top:5px;font-variant-numeric:tabular-nums}
.tile .v.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.tile .s{font-size:.76rem;color:var(--ink2);margin-top:3px}
.card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--ring);border-radius:18px;padding:16px;margin-top:12px;overflow-x:auto}
.card h2{font-size:.95rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card h2 .sub{font-weight:400;color:var(--muted);font-size:.78rem}
.legend{display:flex;gap:14px;font-size:.76rem;color:var(--ink2);margin-bottom:8px;flex-wrap:wrap}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
table{width:100%;border-collapse:collapse;font-size:.85rem;min-width:560px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;padding:8px;border-bottom:1px solid var(--grid)}
td{padding:9px 8px;border-bottom:1px solid var(--grid);vertical-align:top}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.pill{display:inline-block;font-size:.7rem;padding:2px 9px;border-radius:99px;font-weight:700}
.pill.good{background:color-mix(in srgb,var(--good) 16%,transparent);color:var(--good)}
.pill.warn{background:color-mix(in srgb,var(--warn) 18%,transparent);color:var(--warn)}
.pill.crit{background:color-mix(in srgb,var(--crit) 16%,transparent);color:var(--crit)}
.pill.info{background:color-mix(in srgb,var(--s1) 15%,transparent);color:var(--s1)}
.muted{color:var(--muted);font-size:.83rem}
.rowbtns{display:flex;gap:6px;flex-wrap:wrap}
.rowbtns button{border:1px solid var(--ring);background:var(--surface-2);color:var(--text);border-radius:9px;padding:4px 11px;font-size:.77rem;transition:border-color .15s}
.rowbtns button:hover{border-color:var(--accent)}
.rowbtns button.danger{border-color:color-mix(in srgb,var(--crit) 45%,transparent);color:var(--crit)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--surface-2);border:1px solid var(--ring);border-radius:99px;padding:4px 13px;font-size:.82rem;color:var(--ink2)}
.tooltip{position:fixed;pointer-events:none;background:var(--bg-2);color:var(--text);border:1px solid var(--ring);font-size:.75rem;padding:6px 9px;border-radius:9px;z-index:20;white-space:nowrap;transform:translate(-50%,-130%);box-shadow:0 6px 20px rgba(0,0,0,.35)}

/* feature ranking */
.rankrow{display:grid;grid-template-columns:38px minmax(90px,150px) 1fr 58px;align-items:center;gap:10px;margin:8px 0;font-size:.85rem}
.rankrow .medal{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:.8rem;background:var(--surface-2);color:var(--muted)}
.rankrow:nth-child(1) .medal{background:linear-gradient(135deg,#ffd76a,#e6a817);color:#4d3a00}
.rankrow:nth-child(2) .medal{background:linear-gradient(135deg,#e8ecf5,#a9b2c4);color:#39404f}
.rankrow:nth-child(3) .medal{background:linear-gradient(135deg,#f0b183,#b96b32);color:#4b2708}
.rankrow .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.rankrow .bar{height:20px;border-radius:99px;background:var(--grad);min-width:3px;transition:width .8s cubic-bezier(.2,.7,.3,1);box-shadow:0 2px 10px rgba(108,92,231,.3)}
.rankrow .n{text-align:right;color:var(--ink2);font-variant-numeric:tabular-nums;font-size:.8rem}
.hrow{display:grid;grid-template-columns:minmax(90px,150px) 1fr 58px;align-items:center;gap:10px;margin:7px 0;font-size:.84rem}
.hrow .hbar{height:18px;border-radius:99px;min-width:3px;transition:width .8s cubic-bezier(.2,.7,.3,1)}
.hrow .n{text-align:right;color:var(--ink2);font-variant-numeric:tabular-nums}
.hrow div:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* AI bot */
.bot{display:flex;flex-direction:column;gap:12px;max-width:760px;margin:0 auto}
.botlog{display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:10px;animation:rise .35s ease both;align-items:flex-end}
.msg .avatar{width:34px;height:34px;border-radius:50%;background:var(--grad);display:grid;place-items:center;flex:none;font-size:1rem;box-shadow:0 3px 12px rgba(108,92,231,.4)}
.msg .bubble{background:var(--surface);border:1px solid var(--ring);border-radius:18px 18px 18px 5px;padding:12px 15px;font-size:.9rem;line-height:1.6;max-width:85%;white-space:pre-wrap}
.msg.me{flex-direction:row-reverse}
.msg.me .bubble{background:var(--grad);color:#fff;border:0;border-radius:18px 18px 5px 18px}
.msg .bubble b{color:var(--accent-2)}.msg.me .bubble b{color:#fff}
.typing span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);margin:0 2px;animation:typing 1.1s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
.quickq{display:flex;flex-wrap:wrap;gap:8px}
.quickq button{background:var(--surface-2);border:1px solid var(--ring);color:var(--ink2);border-radius:99px;padding:7px 14px;font-size:.82rem;transition:border-color .15s,color .15s}
.quickq button:hover{border-color:var(--accent);color:var(--text)}

/* chat feed */
.feed{display:flex;flex-direction:column;gap:8px}
.fmsg{background:var(--surface-2);border:1px solid var(--ring);border-radius:14px;padding:10px 13px;animation:rise .3s ease both}
.fmsg .top{display:flex;justify-content:space-between;gap:10px;font-size:.76rem;color:var(--muted);margin-bottom:4px;flex-wrap:wrap;align-items:center}
.fmsg .top b{color:var(--text);font-size:.85rem}
.fmsg .txt{font-size:.9rem;line-height:1.5;overflow-wrap:anywhere}
.searchbar{display:flex;gap:8px;margin-bottom:12px;max-width:460px}
.searchbar .btn{width:auto;margin:0;padding:9px 16px}

.concl{position:relative;overflow:hidden}
.concl::before{content:"";position:absolute;inset:0 0 auto;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2),var(--accent));background-size:200% 100%;animation:glowmove 4s linear infinite}
.concl li{margin:7px 0 7px 16px;line-height:1.6;color:var(--ink2)}
.switch{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
@media(max-width:640px){
  main{padding:12px;padding-bottom:calc(84px + env(safe-area-inset-bottom))}
  .tile .v{font-size:1.45rem}
  .rankrow{grid-template-columns:30px minmax(70px,105px) 1fr 48px}
  .hrow{grid-template-columns:minmax(70px,105px) 1fr 48px}
  .msg .bubble{max-width:92%}
}
</style>
</head>
<body>

<div id="setupView" class="auth hidden">
  <div class="logo"><span class="mark">🎙️</span><h1>Dashboard Setup</h1></div>
  <div id="setupStorage"></div>
  <p>First-time setup. Create your admin password, then scan the QR code with <strong>Google Authenticator</strong>.</p>
  <div id="setupStep1">
    <label>Admin password (min 10 characters)</label>
    <input id="setupPass" type="password" autocomplete="new-password">
    <label>Repeat password</label>
    <input id="setupPass2" type="password" autocomplete="new-password">
    <button class="btn" id="setupBtn">Continue</button>
  </div>
  <div id="setupStep2" class="hidden">
    <div class="qrbox"><img id="qrImg" alt="Scan with Google Authenticator"></div>
    <p>Scan with Google Authenticator, or enter this secret manually:</p>
    <div class="secret" id="secretText"></div>
    <label>Enter the 6-digit code to confirm</label>
    <input id="setupCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
    <button class="btn" id="setupConfirmBtn">Activate dashboard</button>
  </div>
  <div class="err" id="setupErr"></div>
</div>

<div id="loginView" class="auth hidden">
  <div class="logo"><span class="mark">🎙️</span><h1>TalkLive <span style="font-weight:400;color:var(--muted)">Owner</span></h1></div>
  <div id="loginStorage"></div>
  <p>Password + Google Authenticator code required.</p>
  <label>Password</label>
  <input id="loginPass" type="password" autocomplete="current-password">
  <label>Authenticator code</label>
  <input id="loginCode" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
  <button class="btn" id="loginBtn">Sign in</button>
  <div class="err" id="loginErr"></div>
</div>

<div id="dash" class="hidden">
<header>
  <h1><span class="mark" style="width:28px;height:28px;font-size:.85rem">🎙️</span><span class="grad-text">TalkLive</span>&nbsp;<span class="dot"></span></h1>
  <nav class="top" id="nav"></nav>
  <button class="btn ghost" id="logoutBtn">Log out</button>
</header>
<main id="main"></main>
<nav class="tabbar" id="tabbar"></nav>
</div>

<script>
'use strict';
const $=(s)=>document.querySelector(s);
const api=async(p,opt)=>{const r=await fetch('/owner/api/'+p,{headers:{'Content-Type':'application/json'},...opt});if(r.status===401&&p!=='login'){show('login');throw new Error('auth');}const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||'Request failed');return j;};
const post=(p,body)=>api(p,{method:'POST',body:JSON.stringify(body||{})});
const esc=(s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
/* For values placed inside a single-quoted JS string within an inline onclick=
   attribute. HTML-escaping alone is NOT enough there: the browser HTML-decodes
   the attribute before the JS parser runs, so an escaped quote turns back into a
   real quote and breaks out. Unicode-escaping every non-alphanumeric character
   survives HTML decoding intact and can never terminate the string or attribute. */
const jsq=(s)=>String(s==null?'':s).replace(/[^A-Za-z0-9]/g,c=>{const h=c.charCodeAt(0);return h<256?'\\x'+h.toString(16).padStart(2,'0'):'\\u'+h.toString(16).padStart(4,'0');});
const fmtTs=(ts)=>new Date(ts).toLocaleString();
const ago=(ts)=>{const m=Math.round((Date.now()-ts)/60000);if(m<1)return'just now';if(m<60)return m+'m ago';if(m<1440)return Math.round(m/60)+'h ago';return Math.round(m/1440)+'d ago';};
const num=(n)=>Number(n||0).toLocaleString();

function show(view){
  $('#setupView').classList.toggle('hidden',view!=='setup');
  $('#loginView').classList.toggle('hidden',view!=='login');
  $('#dash').classList.toggle('hidden',view!=='dash');
}

/* animated count-up for stat tiles */
function countUp(el,target){
  const t=Number(target)||0;
  if(t<=0||t>200000){el.textContent=num(t);return;}
  const dur=650,start=performance.now();
  const step=(now)=>{const p=Math.min(1,(now-start)/dur);el.textContent=num(Math.round(t*(1-Math.pow(1-p,3))));if(p<1)requestAnimationFrame(step);};
  requestAnimationFrame(step);
}
function animateCounters(){document.querySelectorAll('[data-count]').forEach(el=>countUp(el,el.dataset.count));}

/* ---------- auth flow ---------- */
function renderStorage(storage){
  const s=storage||{};
  let html='';
  if(s.atRisk){
    html=`<div class="stbox bad"><b>⚠️ Database not connected — data will be lost on restart</b>
      Your <code>DATABASE_URL</code> is set but the server could not connect to it, so it fell back to temporary storage. That is why your login keeps resetting. Fix the connection string in Render and redeploy.<br><br>
      Host tried: <code>${esc(s.host||'?')}</code><br>
      Error: <code>${esc(s.error||'unknown')}</code></div>`;
  } else if(!s.configured){
    html=`<div class="stbox bad"><b>⚠️ No database configured</b>Running on temporary storage — your login and all data reset on every deploy/restart. Add a <code>DATABASE_URL</code> environment variable in Render to make it permanent.</div>`;
  }
  const a=document.getElementById('setupStorage'),b=document.getElementById('loginStorage');
  if(a)a.innerHTML=html; if(b)b.innerHTML=html;
}
async function boot(){
  try{
    const st=await api('status');
    renderStorage(st.storage);
    if(!st.setupDone)show('setup');
    else if(st.authed){show('dash');startDash();}
    else show('login');
  }catch(e){show('login');}
}
$('#setupBtn').onclick=async()=>{
  const p=$('#setupPass').value,p2=$('#setupPass2').value;
  $('#setupErr').textContent='';
  if(p.length<10)return $('#setupErr').textContent='Password must be at least 10 characters.';
  if(p!==p2)return $('#setupErr').textContent='Passwords do not match.';
  try{
    const r=await post('setup',{password:p});
    $('#setupStep1').classList.add('hidden');$('#setupStep2').classList.remove('hidden');
    if(r.qr)$('#qrImg').src=r.qr;else $('#qrImg').remove();
    $('#secretText').textContent=r.secret;
  }catch(e){$('#setupErr').textContent=e.message;}
};
$('#setupConfirmBtn').onclick=async()=>{
  $('#setupErr').textContent='';
  try{await post('setup-confirm',{code:$('#setupCode').value});show('dash');startDash();}
  catch(e){$('#setupErr').textContent=e.message;}
};
$('#loginBtn').onclick=async()=>{
  $('#loginErr').textContent='';
  try{await post('login',{password:$('#loginPass').value,code:$('#loginCode').value});$('#loginPass').value='';$('#loginCode').value='';show('dash');startDash();}
  catch(e){$('#loginErr').textContent=e.message;}
};
$('#loginCode').addEventListener('keydown',e=>{if(e.key==='Enter')$('#loginBtn').click();});
$('#logoutBtn').onclick=async()=>{await post('logout');location.reload();};

/* ---------- charts (inline SVG) ---------- */
let tipEl=null;
function tip(show,x,y,html){
  if(!tipEl){tipEl=document.createElement('div');tipEl.className='tooltip hidden';document.body.appendChild(tipEl);}
  tipEl.classList.toggle('hidden',!show);
  if(show){tipEl.innerHTML=html;tipEl.style.left=x+'px';tipEl.style.top=y+'px';}
}
function lineChart(el,series,keys,colors,labels){
  const W=el.clientWidth||800,H=240,P={l:42,r:12,t:12,b:26};
  const max=Math.max(1,...series.flatMap(d=>keys.map(k=>d[k]||0)));
  const x=(i)=>P.l+(series.length<2?0:(i/(series.length-1))*(W-P.l-P.r));
  const y=(v)=>H-P.b-(v/max)*(H-P.t-P.b);
  const ticks=4;let g='';
  for(let t=0;t<=ticks;t++){const v=Math.round(max*t/ticks),yy=y(v);
    g+=`<line x1="${P.l}" x2="${W-P.r}" y1="${yy}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/><text x="${P.l-6}" y="${yy+4}" text-anchor="end" font-size="10" fill="var(--muted)">${v}</text>`;}
  let defs='',paths='';
  keys.forEach((k,ki)=>{
    const pts=series.map((d,i)=>`${x(i)},${y(d[k]||0)}`).join(' ');
    if(ki===0&&series.length>1){
      defs+=`<linearGradient id="area0" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${colors[0]}" stop-opacity=".28"/><stop offset="100%" stop-color="${colors[0]}" stop-opacity="0"/></linearGradient>`;
      paths+=`<polygon points="${x(0)},${y(0)} ${pts} ${x(series.length-1)},${y(0)}" fill="url(#area0)"/>`;
    }
    paths+=`<polyline points="${pts}" fill="none" stroke="${colors[ki]}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  });
  let lbls='';
  series.forEach((d,i)=>{if(i%Math.ceil(series.length/6)===0||i===series.length-1)lbls+=`<text x="${x(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--muted)">${d.day.slice(5)}</text>`;});
  el.innerHTML=`<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block"><defs>${defs}</defs>${g}${paths}${lbls}<rect x="${P.l}" y="${P.t}" width="${W-P.l-P.r}" height="${H-P.t-P.b}" fill="transparent"/></svg>`;
  const svg=el.querySelector('svg');
  svg.addEventListener('mousemove',(e)=>{
    const r=svg.getBoundingClientRect();
    const relX=(e.clientX-r.left)/r.width*W;
    const i=Math.max(0,Math.min(series.length-1,Math.round((relX-P.l)/((W-P.l-P.r)/Math.max(1,series.length-1)))));
    const d=series[i];
    tip(true,e.clientX,e.clientY,`<b>${d.day}</b><br>`+keys.map((k,ki)=>`${labels[ki]}: ${num(d[k])}`).join('<br>'));
  });
  svg.addEventListener('mouseleave',()=>tip(false));
}
function hbars(el,entries,color){
  const max=Math.max(1,...entries.map(e=>e[1]));
  el.innerHTML=entries.map(([name,v])=>`<div class="hrow"><div title="${esc(name)}">${esc(name)}</div><div><div class="hbar" style="width:${Math.max(1,v/max*100)}%;background:${color}"></div></div><div class="n">${num(v)}</div></div>`).join('')||'<div class="muted">No data yet.</div>';
}
function rankedBars(el,entries){
  const max=Math.max(1,...entries.map(e=>e[1]));
  el.innerHTML=entries.map(([name,v],i)=>`<div class="rankrow">
    <div class="medal">${i<3?['🥇','🥈','🥉'][i]:'#'+(i+1)}</div>
    <div class="name" title="${esc(name)}">${esc(name)}</div>
    <div><div class="bar" style="width:${Math.max(2,v/max*100)}%${i>2?';opacity:.55':''}"></div></div>
    <div class="n">${num(v)}</div></div>`).join('')||'<div class="muted">No feature usage recorded yet.</div>';
}

/* ---------- dashboard shell ---------- */
const TABS=[
  ['overview','Overview','📊'],['ai','AI Bot','🤖'],['live','Live','🟢'],['chats','Chats','💬'],
  ['reports','Reports','🚩'],['bans','Bans','⛔'],['accounts','Accounts','👤'],
  ['errors','Errors','🐛'],['feedback','Feedback','⭐'],['audit','Audit','🧾'],['settings','Settings','🛠️']
];
const MOBILE_TABS=['overview','ai','live','chats','reports','settings'];
let tab='overview',timer=null,counts={};
function navBtn(id,label,icon,mobile){
  let badge='';
  if(id==='reports'&&counts.unhandledReports)badge=`<span class="badge">${counts.unhandledReports}</span>`;
  if(id==='errors'&&counts.errors)badge=`<span class="badge" style="background:var(--serious)">${counts.errors}</span>`;
  if(mobile)return `<button data-t="${id}" class="${tab===id?'on':''}"><span class="ic">${icon}</span>${label}${badge}</button>`;
  return `<button data-t="${id}" class="${tab===id?'on':''}">${icon} ${label}${badge}</button>`;
}
function renderNav(){
  $('#nav').innerHTML=TABS.map(([id,l,ic])=>navBtn(id,l,ic,false)).join('');
  $('#tabbar').innerHTML=MOBILE_TABS.map(id=>{const t=TABS.find(x=>x[0]===id);return navBtn(t[0],t[1],t[2],true);}).join('');
  document.querySelectorAll('#nav button,#tabbar button').forEach(b=>b.onclick=()=>{tab=b.dataset.t;renderNav();load();window.scrollTo({top:0});});
}
function startDash(){renderNav();load();clearInterval(timer);timer=setInterval(load,tab==='live'?5000:12000);}
async function load(){
  clearInterval(timer);timer=setInterval(load,tab==='live'?5000:tab==='ai'?60000:12000);
  try{
    if(tab==='overview')await viewOverview();
    else if(tab==='ai')await viewBot();
    else if(tab==='live')await viewLive();
    else if(tab==='reports')await viewReports();
    else if(tab==='bans')await viewBans();
    else if(tab==='chats')await viewChats();
    else if(tab==='accounts')await viewAccounts();
    else if(tab==='errors')await viewErrors();
    else if(tab==='feedback')await viewFeedback();
    else if(tab==='audit')await viewAudit();
    else if(tab==='settings')await viewSettings();
  }catch(e){if(e.message!=='auth')$('#main').innerHTML=`<div class="card">Failed to load: ${esc(e.message)}</div>`;}
}

/* ---------- AI bot ---------- */
let lastOverview=null,botLog=[];
const BOT_QS=[
  ['summary','📋 Full summary'],['features','🏆 Rank features'],['feedback','⭐ User feedback'],
  ['problems','🚨 Any problems?'],['audience','🌍 My audience'],['now','🟢 What’s happening now?']
];
async function botAnswer(kind){
  const o=lastOverview||await api('overview');lastOverview=o;
  const sum7=(f)=>o.series.slice(-7).reduce((a,d)=>a+(d[f]||0),0);
  if(kind==='summary')return o.conclusion.summary.join('\n• ').replace(/^/,'• ')+`\n\nOverall health: ${o.conclusion.health.toUpperCase()}.`;
  if(kind==='features'){
    if(!o.features.length)return 'No feature usage recorded yet. Once users start using filters, friends, text chat etc., I’ll rank them here.';
    return 'Feature ranking over the last 30 days:\n\n'+o.features.map(([f,n],i)=>`${i<3?['🥇','🥈','🥉'][i]:(i+1)+'.'} ${f} — ${num(n)} uses`).join('\n')+`\n\nMost loved: ${o.features[0][0]}. Least used: ${o.features[o.features.length-1][0]} — consider improving or promoting it.`;
  }
  if(kind==='feedback'){
    const r=await api('feedback');
    if(!r.feedback.length)return 'No user feedback submitted yet. Feedback users send from the app will show up here and in the Feedback tab.';
    const recent=r.feedback.slice(0,5).map(f=>`• ${f.username}${f.country?' ('+f.country+')':''}: “${f.text.slice(0,140)}”`).join('\n');
    return `You have ${num(r.feedback.length)} feedback message(s). The latest:\n\n${recent}\n\nFull list is in the Feedback tab.`;
  }
  if(kind==='problems'){
    const lines=[];
    if(o.counts.unhandledReports)lines.push(`🚩 ${o.counts.unhandledReports} unhandled user report(s) — check the Reports tab.`);
    if(o.counts.errors)lines.push(`🐛 ${o.counts.errors} error record(s) logged — check the Errors tab.`);
    if(o.counts.activeBans)lines.push(`⛔ ${o.counts.activeBans} active ban(s).`);
    if(sum7('errors')>5)lines.push(`⚠️ ${sum7('errors')} error events this week is high.`);
    if(o.maintenance.on)lines.push('🛠️ Maintenance mode is ON — users cannot use the site right now!');
    return lines.length?lines.join('\n'):'✅ All clear — no unhandled reports, no logged errors, no active bans. TalkLive is running smoothly.';
  }
  if(kind==='audience'){
    const top=o.countries.slice(0,5).map(([c,n],i)=>`${i+1}. ${c} — ${num(n)} visits`).join('\n');
    return o.countries.length?`Your top countries (last 30 days):\n\n${top}\n\nTop city: ${o.cities[0]?o.cities[0][0]+' ('+num(o.cities[0][1])+' visits)':'n/a'}.`:'No geo data yet.';
  }
  return `Right now: ${num(o.runtime.online)} user(s) online — ${num(o.runtime.inCall/2|0)} in calls, ${num(o.runtime.waiting)} waiting for a match.\nToday: ${num(o.today.visits)} visits, ${num(o.today.matches)} matches, peak of ${num(o.today.peakOnline)} online.\nServer: up ${Math.floor(o.runtime.uptimeSeconds/3600)}h, ${o.runtime.memoryMB} MB RAM.`;
}
window.askBot=async(kind,label)=>{
  botLog.push({me:true,text:label});
  renderBot(true);
  try{const a=await botAnswer(kind);setTimeout(()=>{botLog.push({me:false,text:a});renderBot(false);},450);}
  catch(e){botLog.push({me:false,text:'Sorry, I could not fetch that: '+e.message});renderBot(false);}
};
function renderBot(typing){
  const el=$('#botlog');if(!el)return;
  el.innerHTML=botLog.map(m=>`<div class="msg ${m.me?'me':''}">${m.me?'':'<div class="avatar">🤖</div>'}<div class="bubble">${esc(m.text)}</div></div>`).join('')
    +(typing?'<div class="msg"><div class="avatar">🤖</div><div class="bubble typing"><span></span><span></span><span></span></div></div>':'');
  el.lastElementChild&&el.lastElementChild.scrollIntoView({block:'end',behavior:'smooth'});
}
async function viewBot(){
  if(!lastOverview)lastOverview=await api('overview');
  if(!botLog.length)botLog.push({me:false,text:'Hey! 👋 I’m your TalkLive AI assistant. I watch everything happening on the app — traffic, matches, chats, reports, errors — and turn it into plain answers. Tap a question below.'});
  $('#main').innerHTML=`<div class="bot">
    <div class="card anim" style="margin-top:0"><h2>🤖 TalkLive AI Bot <span class="sub">answers from live app data · refreshes every minute</span></h2>
      <div class="botlog" id="botlog"></div>
      <div class="quickq" style="margin-top:14px">${BOT_QS.map(([k,l])=>`<button onclick="askBot('${k}','${jsq(l)}')">${l}</button>`).join('')}</div>
    </div></div>`;
  renderBot(false);
}

/* ---------- ban helpers ---------- */
const DUR=[['30','30 minutes'],['60','1 hour'],['360','6 hours'],['1440','1 day'],['4320','3 days'],['10080','7 days'],['43200','30 days'],['129600','90 days'],['525600','1 year'],['2628000','5 years']];
function banButtons(u){
  return `<div class="rowbtns"><button class="danger" onclick="banUser('${jsq(u.clientId)}','${jsq(u.ip||'')}','${jsq(u.username)}','${jsq(u.country||'')}','${jsq(u.city||'')}')">Ban…</button></div>`;
}
window.banUser=async(clientId,ip,username,country,city)=>{
  const choice=prompt(`Ban ${username}?\nEnter duration:\n30 = 30 min, 60 = 1 hour, 1440 = 1 day, 10080 = 7 days, 43200 = 30 days, 525600 = 1 year\n(minutes)`,'30');
  if(!choice)return;
  const reason=prompt('Reason for the ban (shown in your audit log):','Owner ban')||'Owner ban';
  try{await post('ban',{clientId,ip,username,country,city,minutes:Number(choice),reason});load();}
  catch(e){alert(e.message);}
};

async function viewErrors(){
  const r=await api('errors');
  $('#main').innerHTML=`<div class="card anim" style="margin-top:0"><h2>🐛 Bugs &amp; errors <span class="sub">client + server, duplicates collapsed</span></h2>
  <table><tr><th>Last seen</th><th>Source</th><th>Error</th><th class="num">Count</th><th>User</th></tr>
  ${r.errors.map(e=>`<tr><td>${ago(e.ts)}</td><td><span class="pill ${e.source==='server'?'crit':'warn'}">${esc(e.source)}</span></td>
  <td><b>${esc(e.message)}</b>${e.url?`<br><span class="muted">${esc(e.url)}</span>`:''}${e.stack?`<details><summary class="muted" style="cursor:pointer">stack</summary><pre style="font-size:.7rem;white-space:pre-wrap;color:var(--ink2)">${esc(e.stack)}</pre></details>`:''}</td>
  <td class="num">${num(e.count)}</td><td>${esc(e.username||'')}${e.country?`<br><span class="muted">${esc(e.country)}</span>`:''}</td></tr>`).join('')||'<tr><td colspan="5" class="muted">No errors logged. 🎉</td></tr>'}</table></div>`;
}

async function viewFeedback(){
  const r=await api('feedback');
  $('#main').innerHTML=`<div class="card anim" style="margin-top:0"><h2>⭐ User feedback <span class="sub">${r.feedback.length} total</span></h2>
  <div class="feed">
  ${r.feedback.map(f=>`<div class="fmsg"><div class="top"><span><b>${esc(f.username)}</b>${f.country?` · ${esc(f.country)}`:''}</span><span>${ago(f.ts)} · ${fmtTs(f.ts)}</span></div>
  <div class="txt">${esc(f.text)}</div></div>`).join('')||'<div class="muted">No feedback yet.</div>'}
  </div></div>`;
}

async function viewAudit(){
  const r=await api('audit');
  $('#main').innerHTML=`<div class="card anim" style="margin-top:0"><h2>🧾 Security audit log <span class="sub">every login, ban and admin action</span></h2>
  <table><tr><th>When</th><th>Action</th><th>IP</th><th>Detail</th></tr>
  ${r.audit.map(a=>`<tr><td>${fmtTs(a.ts)}</td><td><span class="pill ${/fail|lockout/.test(a.action)?'crit':'info'}">${esc(a.action)}</span></td><td class="muted">${esc(a.ip)}</td><td>${esc(a.detail)}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">Empty.</td></tr>'}</table></div>`;
}

async function viewSettings(){
  const o=await api('overview');
  const m=o.maintenance;
  $('#main').innerHTML=`<div class="card anim" style="margin-top:0"><h2>🛠️ Maintenance mode</h2>
  <p class="muted" style="margin-bottom:12px">When on, visitors see a friendly maintenance page and nobody can connect. Your dashboard stays available.</p>
  <div class="switch"><b>Status:</b> ${m.on?'<span class="pill crit">MAINTENANCE ON — site is down for users</span>':'<span class="pill good">Site is LIVE</span>'}</div>
  <label style="display:block;margin:14px 0 6px;font-size:.85rem;color:var(--ink2)">Message shown to users</label>
  <textarea id="maintMsg" rows="3">${esc(m.message)}</textarea>
  <div class="rowbtns" style="margin-top:12px">
    <button class="${m.on?'':'danger'}" id="maintBtn">${m.on?'✅ Bring site back online':'⛔ Take site into maintenance'}</button>
  </div></div>`;
  $('#maintBtn').onclick=async()=>{
    if(!m.on&&!confirm('Take TalkLive OFFLINE for all users?'))return;
    await post('maintenance',{on:!m.on,message:$('#maintMsg').value});load();
  };
}

boot();
</script>
</body>
</html>
