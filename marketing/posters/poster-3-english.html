<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; background:#0b0f1a; overflow:hidden; position:relative;
    font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#fff; }
  .glow1 { position:absolute; width:900px; height:900px; border-radius:50%; filter:blur(150px);
    background:radial-gradient(circle,#34d39940,transparent 70%); top:-300px; left:-240px; }
  .glow2 { position:absolute; width:800px; height:800px; border-radius:50%; filter:blur(150px);
    background:radial-gradient(circle,#22d3ee40,transparent 70%); bottom:-280px; right:-220px; }
  .inner { position:relative; z-index:2; height:100%; padding:80px 84px; display:flex; flex-direction:column; }
  .brand { display:flex; align-items:center; gap:18px; font-size:44px; font-weight:800; }
  .dot { width:18px; height:18px; border-radius:50%; background:#34d399; box-shadow:0 0 24px #34d399; }
  .bubbles { margin:64px 0 56px; display:flex; flex-direction:column; gap:34px; }
  .b { max-width:760px; border-radius:36px; padding:28px 40px; font-size:36px; line-height:1.35; font-weight:600; }
  .them { background:#1a2132; color:#dbe2f0; border-bottom-left-radius:8px; }
  .you { background:linear-gradient(90deg,#7c3aed,#22d3ee); align-self:flex-end; border-bottom-right-radius:8px; }
  h1 { font-size:84px; font-weight:900; line-height:1.06; letter-spacing:-2.5px; }
  h1 .grad { background:linear-gradient(90deg,#34d399,#22d3ee); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { font-size:36px; color:#aab3c8; margin-top:28px; line-height:1.45; font-weight:500; }
  .footer { margin-top:auto; display:flex; align-items:center; justify-content:space-between; }
  .url { font-size:50px; font-weight:800; }
  .url span { color:#34d399; }
  .free { border:3px solid #34d399; color:#34d399; border-radius:999px; padding:18px 44px; font-size:36px; font-weight:800; }
</style></head>
<body>
  <div class="glow1"></div><div class="glow2"></div>
  <div class="inner">
    <div class="brand"><span class="dot"></span> TalkLive</div>
    <div class="bubbles">
      <div class="b them">🎙 "Hey! Where are you calling from?"</div>
      <div class="b you">"Karachi! Can I practise my English with you?"</div>
      <div class="b them">"Of course — that's what I'm here for 😄"</div>
    </div>
    <h1>Practice English with <span class="grad">a real human.</span></h1>
    <p class="sub">Live voice calls with strangers worldwide. Free forever.<br>No tutor fees. No sign-up. No camera.</p>
    <div class="footer">
      <div class="url">talklive<span>.app</span></div>
      <div class="free">100% FREE</div>
    </div>
  </div>
</body></html>
