<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; background:#07080d; overflow:hidden; position:relative;
    font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#fff; }
  .glow { position:absolute; width:1100px; height:1100px; border-radius:50%; filter:blur(170px);
    background:radial-gradient(circle,#7c3aed45,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); }
  .inner { position:relative; z-index:2; height:100%; padding:100px 84px; display:flex; flex-direction:column; justify-content:center; text-align:center; }
  .rip { font-size:40px; color:#69718a; letter-spacing:.35em; text-transform:uppercase; font-weight:600; }
  h1 { font-size:120px; font-weight:900; line-height:1.05; letter-spacing:-3.5px; margin:60px 0; }
  h1 .dead { color:#69718a; text-decoration:line-through; text-decoration-color:#ef4444; text-decoration-thickness:10px; }
  h1 .grad { background:linear-gradient(90deg,#a78bfa,#22d3ee); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { font-size:44px; color:#aab3c8; line-height:1.45; font-weight:500; }
  .cta { margin:90px auto 0; display:inline-block; background:linear-gradient(90deg,#7c3aed,#22d3ee);
    border-radius:999px; padding:34px 80px; font-size:46px; font-weight:800; }
  .brand { position:absolute; bottom:80px; left:0; right:0; text-align:center; font-size:44px; font-weight:800; z-index:3; }
  .brand span { color:#22d3ee; }
</style></head>
<body>
  <div class="glow"></div>
  <div class="inner">
    <div class="rip">2009 — 2023</div>
    <h1><span class="dead">Omegle</span> is gone.<br><span class="grad">Your voice isn't.</span></h1>
    <p class="sub">Random voice chat with strangers worldwide.<br>Anonymous. Audio-only. Never recorded.</p>
    <div><span class="cta">Start talking — free</span></div>
  </div>
  <div class="brand">talklive<span>.app</span></div>
</body></html>
