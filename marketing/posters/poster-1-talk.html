  .footer { margin-top:auto; display:flex; align-items:flex-end; justify-content:space-between; }
  .url { font-size:52px; font-weight:800; }

  .qr { width:190px; height:190px; background:#fff; border-radius:20px; display:flex; align-items:center; justify-content:center; color:#0b0f1a; font-size:22px; font-weight:700; text-align:center; }
