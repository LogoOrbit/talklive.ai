<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TalkLive — Talk to Strangers</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        TalkLive
      </div>
      <div class="header-right">
        <span id="myProfile" class="my-profile hidden"></span>
        <div class="online">
          <span class="online-dot"></span>
          <span id="onlineCount">0</span> online
        </div>
      </div>
    </header>

    <main class="stage">

      <!-- Setup panel: shown before the first call -->
      <section id="setupPanel" class="setup-panel">
        <div id="tapToTalk" class="tap-to-talk">
          <button id="startBtn" class="tap-orb">
            <span class="tap-orb-core"></span>
            <span class="tap-orb-label">Tap to Talk</span>
          </button>
          <button id="customizeToggle" class="customize-link">Customize ⌄</button>
        </div>

        <div id="filtersPanel" class="filters-panel hidden">
          <div class="pill-row">
            <span class="pill-label">I am</span>
            <div class="pill-group" id="genderGroup" data-value="unspecified">
              <button type="button" class="pill" data-value="unspecified"><span class="pill-dot"></span>Prefer not to say</button>
              <button type="button" class="pill" data-value="male"><span class="pill-dot"></span>Male</button>
              <button type="button" class="pill" data-value="female"><span class="pill-dot"></span>Female</button>
            </div>
          </div>

          <div class="pill-row">
            <span class="pill-label">Match me with</span>
            <div class="pill-group" id="prefGenderGroup" data-value="any">
              <button type="button" class="pill" data-value="any"><span class="pill-dot"></span>Anyone</button>
              <button type="button" class="pill" data-value="male"><span class="pill-dot"></span>Male</button>
              <button type="button" class="pill" data-value="female"><span class="pill-dot"></span>Female</button>
            </div>
          </div>

          <div class="pill-row">
            <span class="pill-label">Country</span>
            <div class="country-picker">
              <button type="button" class="pill any-pill selected" id="countryAnyPill" data-value="any"><span class="pill-dot"></span>Any</button>
              <div class="country-search-wrap">
                <input type="text" id="countrySearch" class="search-input" placeholder="Search country…" autocomplete="off" />
                <div id="countryResults" class="search-results hidden"></div>
              </div>
              <span id="countrySelectedPill" class="pill selected hidden"></span>
            </div>
          </div>

          <div class="pill-row">
            <span class="pill-label">Interests <span class="hint">(optional)</span></span>
            <div class="interests-picker">
              <div id="interestTags" class="interest-tags"></div>
              <div class="interest-input-wrap">
                <input type="text" id="interestInput" class="search-input" placeholder="Type an interest and press Enter…" autocomplete="off" maxlength="20" />
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Call panel: shown during waiting/connected states -->
      <section id="callPanel" class="call-panel hidden">
        <div class="orb-wrap">
          <div id="orb" class="orb idle">
            <div class="orb-core"></div>
            <div class="orb-ring r1"></div>
            <div class="orb-ring r2"></div>
          </div>
        </div>

        <p id="statusText" class="status-text">Tap start to talk to a random stranger</p>
        <p id="subText" class="sub-text">Audio only · No sign up · No registration</p>

        <div id="partnerCard" class="partner-card hidden">
          <div class="partner-name" id="partnerName">—</div>
          <div class="partner-meta" id="partnerMeta">—</div>
          <div class="partner-interests" id="partnerInterests"></div>
        </div>

        <div class="controls">
          <button id="skipBtn" class="btn btn-secondary hidden">Next Stranger</button>
          <button id="muteBtn" class="btn btn-icon hidden" title="Mute microphone">🎤</button>
          <button id="chatToggleBtn" class="btn btn-icon hidden" title="Toggle chat">💬</button>
          <button id="reportBtn" class="btn btn-danger hidden" title="Report and block">Report</button>
          <button id="stopBtn" class="btn btn-secondary hidden">Stop</button>
        </div>

        <p id="errorText" class="error-text hidden"></p>
      </section>

      <!-- Chat panel -->
      <section id="chatPanel" class="chat-panel hidden">
        <div id="chatMessages" class="chat-messages"></div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" type="text" maxlength="1000" placeholder="Type a message…" autocomplete="off" />
          <button type="submit" class="btn btn-primary chat-send">Send</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      Be respectful. You may be paired with anyone in the world. Audio only — no video, no recording.
    </footer>
  </div>

  <audio id="remoteAudio" autoplay playsinline></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script src="countries.js"></script>
  <script src="app.js"></script>
</body>
</html>
